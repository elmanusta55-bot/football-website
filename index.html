<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ Football Game - Gardenscapes Style</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="game-header">
            <h1>⚽ Football Stadium Game</h1>
            <div class="header-stats">
                <div class="stat">
                    <span class="stat-label">Level</span>
                    <span class="stat-value" id="level">1</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Score</span>
                    <span class="stat-value" id="score">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Moves</span>
                    <span class="stat-value" id="moves">15</span>
                </div>
            </div>
        </header>

        <!-- Main Game Area -->
        <main class="game-container">
            <!-- Game Board -->
            <div class="game-board-wrapper">
                <div id="game-board" class="game-board"></div>
            </div>

            <!-- Sidebar -->
            <aside class="sidebar">
                <!-- Coins -->
                <div class="reward-box">
                    <h3>💰 Coins</h3>
                    <div class="coin-display">
                        <span id="coins">0</span> 🪙
                    </div>
                </div>

                <!-- Stadium Level -->
                <div class="stadium-box">
                    <h3>🏟️ Stadium Level</h3>
                    <div class="stadium-level">
                        <span id="stadium-level">1</span>
                    </div>
                    <p class="stadium-progress">Upgrade your stadium with stars!</p>
                </div>

                <!-- Daily Reward -->
                <div class="daily-box">
                    <h3>🎁 Daily Reward</h3>
                    <button class="daily-btn" onclick="game.claimDailyReward()">
                        Claim 50 Coins
                    </button>
                </div>

                <!-- Game Info -->
                <div class="info-box">
                    <h4>📋 How to Play:</h4>
                    <ul>
                        <li>Swap adjacent tiles</li>
                        <li>Match 3+ in a row</li>
                        <li>Score 100+ to pass level</li>
                        <li>Earn ⭐ for upgrades</li>
                    </ul>
                </div>

                <!-- Buttons -->
                <div class="button-group">
                    <button class="btn btn-primary" onclick="game.resetLevel()">
                        Reset Level
                    </button>
                </div>
            </aside>
        </main>

        <!-- Footer -->
        <footer class="game-footer">
            <p>🎮 Football Puzzle Game | Made with ❤️</p>
        </footer>
    </div>

    <script src="game.js"></script>
</body>
</html>
